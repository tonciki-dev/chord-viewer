<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コード譜職人 | Professional Edition</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4a044">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Kiwi+Maru:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
  /* モダン・ダークテーマ */
  --bg: #0f0f0f;
  --panel: #1a1a1a;
  --panel2: #222222;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #d4a044;
  --accent-dim: #5c431d;
  --accent-light: #f5d18f;
  --text: #f0f0f0;
  --text-dim: #a0a0a0;
  --chord-col: #f0c050;
  --shadow: 0 10px 30px rgba(0,0,0,0.5);
  --radius: 8px;
}

:root.light {
  --bg: #faf9f6;
  --panel: #ffffff;
  --panel2: #f2f0e9;
  --border: rgba(0, 0, 0, 0.06);
  --accent: #9a6a1a;
  --accent-dim: #d4a044;
  --accent-light: #6a4a10;
  --text: #2d2a26;
  --text-dim: #7a756e;
  --chord-col: #b07020;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  line-height: 1.6;
}

/* ── Header ── */
header {
  height: 60px;
  padding: 0 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(12px);
  position: relative;
  z-index: 100;
}

.logo {
  font-family: 'Kiwi Maru', serif;
  font-weight: 500;
  font-size: 1.2rem;
  color: var(--accent-light);
  letter-spacing: 0.05em;
}

.header-actions { display: flex; gap: 12px; }

/* ── Instrument Bar ── */
.inst-bar {
  height: 50px;
  padding: 0 24px;
  background: var(--panel2);
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}

.inst-btn {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 5px 16px;
  border-radius: 100px;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.inst-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 4px 12px rgba(212,160,68,0.2);
}

/* ── Main Workspace ── */
.workspace {
  display: flex;
  height: calc(100vh - 110px);
}

.panel-bar {
  background: var(--panel2);
  color: var(--text-dim);
  padding: 8px 16px;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}

/* --- Editor Panel --- */
.editor-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
}

.title-row {
  padding: 16px 20px;
  background: var(--panel);
}

.title-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-size: 1.2rem;
  font-weight: 500;
  padding: 8px 0;
  outline: none;
  transition: border-color 0.3s;
}

.title-input:focus { border-color: var(--accent); }

textarea {
  flex: 1;
  width: 100%;
  background: var(--panel);
  color: var(--text);
  border: none;
  padding: 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.95rem;
  line-height: 2;
  resize: none;
  outline: none;
}

/* --- Preview Panel --- */
.view-panel {
  flex: 1;
  background: var(--bg);
  display: flex;
  flex-direction: column;
}

.view-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 40px;
  background-image: radial-gradient(var(--border) 1px, transparent 1px);
  background-size: 24px 24px;
}

#output {
  max-width: 800px;
  margin: 0 auto;
  background: var(--panel);
  padding: 50px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  min-height: 100%;
}

.print-title {
  font-family: 'Kiwi Maru', serif;
  font-size: 2rem;
  margin-bottom: 32px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--accent);
  display: inline-block;
}

.lyric-line {
  margin-bottom: 24px;
  min-height: 1.5em;
}

.chord-row {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 4px;
}

.chord-label {
  color: var(--accent);
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.9rem;
  background: rgba(212,160,68,0.1);
  padding: 2px 6px;
  border-radius: 4px;
}

/* ── Buttons ── */
.btn {
  background: var(--panel2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
}

.btn:hover { opacity: 0.8; transform: translateY(-1px); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
</style>
</head>
<body>

<header>
  <div class="logo">コード譜職人</div>
  <div class="header-actions">
    <button class="btn" onclick="toggleTheme()">🌓 Theme</button>
    <button class="btn btn-primary" onclick="exportPDF()">PDF Export</button>
  </div>
</header>

<div class="inst-bar">
  <button class="inst-btn active" onclick="setInst('gt')">Acoustic Guitar</button>
  <button class="inst-btn" onclick="setInst('uk')">Ukulele</button>
</div>

<main class="workspace">
  <section class="editor-panel">
    <div class="panel-bar">Editor</div>
    <div class="title-row">
      <input type="text" id="songTitle" class="title-input" placeholder="曲名を入力..." oninput="updatePreview()">
    </div>
    <textarea id="editor" placeholder="[C]ここに歌詞を入力...&#10;改行で次の行へ" oninput="updatePreview()"></textarea>
  </section>

  <section class="view-panel">
    <div class="panel-bar">Preview</div>
    <div class="view-scroll">
      <div id="output">
        <h1 id="viewTitle" class="print-title">Untitled Song</h1>
        <div id="viewLyrics"></div>
      </div>
    </div>
  </section>
</main>

<script>
function updatePreview() {
  const title = document.getElementById('songTitle').value;
  document.getElementById('viewTitle').textContent = title || 'Untitled Song';
  
  const text = document.getElementById('editor').value;
  const lines = text.split('\n');
  const container = document.getElementById('viewLyrics');
  container.innerHTML = '';

  lines.forEach(line => {
    const lineDiv = document.createElement('div');
    lineDiv.className = 'lyric-line';

    // コード抽出用正規表現
    const chords = [...line.matchAll(/\[(.*?)\]/g)];
    const lyricText = line.replace(/\[.*?\]/g, '');

    if (chords.length > 0) {
      const chordRow = document.createElement('div');
      chordRow.className = 'chord-row';
      chords.forEach(match => {
        const span = document.createElement('span');
        span.className = 'chord-label';
        span.textContent = match[1];
        chordRow.appendChild(span);
      });
      lineDiv.appendChild(chordRow);
    }

    const textSpan = document.createElement('div');
    textSpan.className = 'lyric-text';
    textSpan.textContent = lyricText || ' ';
    lineDiv.appendChild(textSpan);
    
    container.appendChild(lineDiv);
  });
}

function toggleTheme() {
  document.documentElement.classList.toggle('light');
}

function setInst(type) {
  document.querySelectorAll('.inst-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  // 楽器切り替えのロジックをここに
}

async function exportPDF() {
  const { jsPDF } = window.jspdf;
  const element = document.getElementById('output');
  const canvas = await html2canvas(element, { scale: 2 });
  const imgData = canvas.toDataURL('image/png');
  
  const pdf = new jsPDF('p', 'mm', 'a4');
  const width = pdf.internal.pageSize.getWidth();
  const height = (canvas.height * width) / canvas.width;
  pdf.addImage(imgData, 'PNG', 0, 0, width, height);
  pdf.save("chord-sheet.pdf");
}
</script>

</body>
</html>
